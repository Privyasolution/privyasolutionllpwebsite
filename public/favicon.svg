<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- Gradient works on both dark and light backgrounds -->
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background — visible on both light and dark -->
  <rect width="64" height="64" rx="14" fill="url(#fg)"/>

  <!-- Outer hexagon -->
  <path d="M32 8L50 18.5V43.5L32 54L14 43.5V18.5Z"
    stroke="white" stroke-width="2.2" stroke-linejoin="round"
    fill="rgba(255,255,255,0.10)"/>

  <!-- Inner hexagon -->
  <path d="M32 18L43 24.5V37.5L32 44L21 37.5V24.5Z"
    stroke="rgba(255,255,255,0.65)" stroke-width="1.6" stroke-linejoin="round"
    fill="rgba(255,255,255,0.18)"/>

  <!-- Center node -->
  <circle cx="32" cy="31" r="5.5" fill="white" fill-opacity="0.95"/>

  <!-- Subtle spokes -->
  <line x1="32" y1="25.5" x2="32" y2="8"  stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-dasharray="2 3"/>
  <line x1="32" y1="36.5" x2="32" y2="54" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-dasharray="2 3"/>
  <line x1="27.2" y1="28.2" x2="14" y2="18.5" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-dasharray="2 3"/>
  <line x1="36.8" y1="28.2" x2="50" y2="18.5" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-dasharray="2 3"/>
</svg>
